<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mantenimiento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .prio-Alta { border-left: 10px solid #dc3545 !important; }
        .prio-Media { border-left: 10px solid #ffc107 !important; }
        .prio-Baja { border-left: 10px solid #0dcaf0 !important; }
        .en-proceso { background-color: #fffde7 !important; border-left: 10px solid #fd7e14 !important; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary sticky-top shadow">
        <div class="container-fluid">
            <span class="navbar-brand fw-bold">EQUIPOS</span>
            <div class="d-flex gap-2">
                <a href="/crear" class="btn btn-warning btn-sm fw-bold">+ NUEVO</a>
                <a href="/historial" class="btn btn-outline-light btn-sm">Historial</a>
            </div>
        </div>
    </nav>

    <div class="container mt-3">
        {% if pendientes %}
            {% for p in pendientes %}
            <div class="card shadow-sm mb-3 border-0 rounded-3 {% if p[3] == 'En Proceso' %}en-proceso{% else %}prio-{{ p[6] }}{% endif %}">
                <div class="card-body p-3">
                    <div class="d-flex justify-content-between align-items-start">
                        <div style="max-width: 70%;">
                            <h6 class="fw-bold text-dark mb-0 text-uppercase">{{ p[1] }}</h6>
                            <p class="text-secondary small mb-2">📍 {{ p[2] }}</p>
                        </div>
                        <div class="d-flex flex-column align-items-end">
                            <span class="badge {% if p[6]=='Alta' %}bg-danger{% elif p[6]=='Media' %}bg-warning text-dark{% else %}bg-info{% endif %} mb-2">{{ p[6] }}</span>
                            <div class="btn-group">
                                <button class="btn btn-sm btn-outline-secondary border-0" onclick="abrirEditor('{{p[0]}}','{{p[1]}}','{{p[2]}}','{{p[6]}}')"><i class="bi bi-pencil"></i></button>
                                <button class="btn btn-sm btn-outline-danger border-0" onclick="confirmarBorrar('{{p[0]}}')"><i class="bi bi-trash"></i></button>
                            </div>
                        </div>
                    </div>

                    {% if p[3] == 'Pendiente' %}
                        <form action="/asignar/{{ p[0] }}" method="POST" class="input-group mt-2">
                            <input type="text" name="operario" class="form-control form-control-sm" placeholder="Nombre equipo..." required>
                            <button class="btn btn-primary btn-sm px-3 fw-bold" type="submit">¡VOY!</button>
                        </form>
                    {% else %}
                        <div class="border-top pt-2 mt-2">
                            <p class="small text-primary fw-bold mb-2">👷 {{ p[5] }} (en curso)</p>
                            <div class="bg-white p-2 rounded border">
                                <div class="row g-1 mb-2">
                                    <div class="col-8">
                                        <select id="sel-{{ p[0] }}" class="form-select form-select-sm" onchange="checkOtros(this, 'otro-box-{{ p[0] }}')">
                                            {% for r in recambios %} <option value="{{ r }}">{{ r }}</option> {% endfor %}
                                        </select>
                                    </div>
                                    <div class="col-2"><input type="number" id="qty-{{ p[0] }}" class="form-control form-control-sm" value="1" min="1"></div>
                                    <div class="col-2"><button type="button" class="btn btn-dark btn-sm w-100" onclick="addPieza('{{ p[0] }}')">+</button></div>
                                </div>
                                <div id="otro-box-{{ p[0] }}" style="display:none" class="mb-2">
                                    <input type="text" id="manual-{{ p[0] }}" class="form-control form-control-sm" placeholder="¿Qué pieza es?">
                                </div>
                                <div id="lista-{{ p[0] }}" class="mb-2"></div>
                                <form action="/completar/{{ p[0] }}" method="POST" id="form-{{ p[0] }}">
                                    <div id="inputs-{{ p[0] }}"></div>
                                    <input type="hidden" name="recambio_otro" id="hidden-otro-{{ p[0] }}">
                                    <button type="submit" class="btn btn-success btn-sm w-100 fw-bold shadow-sm">TERMINAR Y GUARDAR</button>
                                </form>
                            </div>
                        </div>
                    {% endif %}
                </div>
            </div>
            {% endfor %}
        {% else %}
            <div class="alert alert-info text-center mt-4">No hay avisos pendientes.</div>
        {% endif %}
    </div>

    <script>
    function checkOtros(s, id) { document.getElementById(id).style.display = s.value.includes("OTROS") ? "block" : "none"; }

    function addPieza(id) {
        const s = document.getElementById('sel-'+id);
        const q = document.getElementById('qty-'+id);
        const l = document.getElementById('lista-'+id);
        const inp = document.getElementById('inputs-'+id);
        const m = document.getElementById('manual-'+id);
        const hM = document.getElementById('hidden-otro-'+id);

        if(s.value.includes("OTROS")) { hM.value = m.value; m.disabled = true; s.disabled = true; return; }
        if(s.value.includes("ninguno")) return;

        const row = document.createElement('div');
        row.className = 'bg-light border rounded p-1 mb-1 small d-flex justify-content-between align-items-center';
        row.innerHTML = `<span><b>${q.value}x</b> ${s.value}</span><span class="text-danger fw-bold px-2" onclick="this.parentElement.remove();">×</span>`;
        l.appendChild(row);

        const hN = document.createElement('input'); hN.type='hidden'; hN.name='nombres[]'; hN.value=s.value;
        const hC = document.createElement('input'); hC.type='hidden'; hC.name='cantidades[]'; hC.value=q.value;
        inp.appendChild(hN); inp.appendChild(hC);
        q.value = 1;
    }

    function abrirEditor(id, elem, ubi, prio) {
        const pin = prompt("PIN para EDITAR:");
        if (pin === "2026") {
            const nElem = prompt("Nuevo Elemento:", elem) || elem;
            const nUbi = prompt("Nueva Ubicación:", ubi) || ubi;
            const nPrio = prompt("Prioridad (Baja/Media/Alta):", prio) || prio;
            
            const form = document.createElement('form');
            form.method = 'POST'; form.action = '/editar/' + id;
            const params = {pin: pin, elemento: nElem, ubicacion: nUbi, prioridad: nPrio};
            for (const key in params) {
                const input = document.createElement('input');
                input.type = 'hidden'; input.name = key; input.value = params[key];
                form.appendChild(input);
            }
            document.body.appendChild(form); form.submit();
        } else if (pin) { alert("PIN incorrecto"); }
    }

    function confirmarBorrar(id) {
        const pin = prompt("PIN para BORRAR:");
        if (pin === "2026") {
            const form = document.createElement('form');
            form.method = 'POST'; form.action = '/borrar/' + id;
            const input = document.createElement('input');
            input.type = 'hidden'; input.name = 'pin'; input.value = pin;
            form.appendChild(input);
            document.body.appendChild(form); form.submit();
        } else if (pin) { alert("PIN incorrecto"); }
    }
    </script>
</body>
</html>
