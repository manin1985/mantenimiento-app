<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mantenimiento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .prio-Alta { border-left: 10px solid #dc3545 !important; }
        .prio-Media { border-left: 10px solid #ffc107 !important; }
        .prio-Baja { border-left: 10px solid #0dcaf0 !important; }
        .en-proceso { background-color: #fffde7 !important; border-left: 10px solid #fd7e14 !important; }
        .card-incidencia { margin-bottom: 1rem; border-radius: 12px; overflow: hidden; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary sticky-top shadow-sm">
        <div class="container-fluid">
            <span class="navbar-brand fw-bold">EQUIPOS UNISON</span>
            <a href="/historial" class="btn btn-outline-light btn-sm">Historial</a>
        </div>
    </nav>

    <div class="container mt-3">
        {% if pendientes %}
            {% for p in pendientes %}
            <div class="card card-incidencia shadow-sm bg-white {% if p[3] == 'En Proceso' %}en-proceso{% else %}prio-{{ p[6] }}{% endif %}">
                <div class="card-body p-3">
                    <div class="d-flex justify-content-between">
                        <h6 class="fw-bold mb-1">{{ p[1] }}</h6>
                        <span class="badge {% if p[6]=='Alta' %}bg-danger{% elif p[6]=='Media' %}bg-warning text-dark{% else %}bg-info{% endif %}">{{ p[6] }}</span>
                    </div>
                    <p class="text-secondary small mb-2">📍 {{ p[2] }}</p>

                    {% if p[3] == 'Pendiente' %}
                        <form action="/asignar/{{ p[0] }}" method="POST" class="input-group">
                            <input type="text" name="operario" class="form-control form-control-sm" placeholder="Nombre equipo" required>
                            <button class="btn btn-primary btn-sm px-3" type="submit">¡VOY!</button>
                        </form>
                    {% else %}
                        <div class="border-top pt-2 mt-2">
                            <p class="small text-orange fw-bold mb-2 text-primary">👷 Asignado a: {{ p[5] }}</p>
                            <form action="/completar/{{ p[0] }}" method="POST">
                                <select name="recambio" class="form-select form-select-sm mb-2" onchange="toggleOtro(this, 'box-{{ p[0] }}')">
                                    {% for r in recambios %}
                                    <option value="{{ r }}">{{ r }}</option>
                                    {% endfor %}
                                </select>
                                <div id="box-{{ p[0] }}" style="display:none;" class="mb-2">
                                    <input type="text" name="recambio_otro" class="form-control form-control-sm" placeholder="¿Qué pieza es?">
                                </div>
                                <button type="submit" class="btn btn-success btn-sm w-100 fw-bold">TERMINAR TAREA</button>
                            </form>
                        </div>
                    {% endif %}
                </div>
            </div>
            {% endfor %}
        {% else %}
            <div class="alert alert-info text-center mt-4">No hay tareas pendientes.</div>
        {% endif %}
    </div>

    <div class="text-center my-4"><a href="/crear" class="text-muted small">Panel Encargado</a></div>

    <script>
        function toggleOtro(sel, divId) {
            const div = document.getElementById(divId);
            const input = div.querySelector('input');
            if (sel.value.includes("OTROS")) {
                div.style.display = "block";
                input.required = true;
            } else {
                div.style.display = "none";
                input.required = false;
            }
        }
    </script>
</body>
</html>
