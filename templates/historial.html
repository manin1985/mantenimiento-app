<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div class="container mt-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold mb-0">HISTORIAL</h5>
            <div>
                <a href="/exportar" class="btn btn-success btn-sm me-1">Excel</a>
                <a href="/" class="btn btn-secondary btn-sm">Volver</a>
            </div>
        </div>
        <div class="table-responsive bg-white rounded shadow-sm">
            <table class="table table-sm table-hover align-middle mb-0" style="font-size: 0.85rem;">
                <thead class="table-dark">
                    <tr><th>Tarea/Ubi</th><th>Recambios</th><th>Acción</th></tr>
                </thead>
                <tbody>
                    {% for r in realizados %}
                    <tr>
                        <td>
                            <b>{{ r[1] }}</b><br>
                            <small class="text-muted">{{ r[2] }} | {{ r[5] }}</small>
                        </td>
                        <td><small>{{ r[7] }}</small></td>
                        <td>
                            <button class="btn btn-outline-warning btn-sm" onclick="confirmarReactivar('{{r[0]}}')"><i class="bi bi-arrow-counterclockwise"></i></button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
    <script>
    function confirmarReactivar(id) {
        const pin = prompt("Introduce PIN para REABRIR esta incidencia:");
        if (pin === "2026") {
            const form = document.createElement('form');
            form.method = 'POST'; form.action = '/reactivar/' + id;
            const input = document.createElement('input');
            input.type = 'hidden'; input.name = 'pin'; input.value = pin;
            form.appendChild(input);
            document.body.appendChild(form); form.submit();
        } else if (pin) { alert("PIN incorrecto"); }
    }
    </script>
</body>
</html>
