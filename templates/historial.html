<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial - Mantenimiento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Historial de Reparaciones</h2>
            <div><a href="/exportar" class="btn btn-success">Excel</a><a href="/" class="btn btn-secondary">Volver</a></div>
        </div>
        <div class="table-responsive">
            <table class="table table-bordered bg-white">
                <thead class="table-dark">
                    <tr>
                        <th>Fecha/Hora</th>
                        <th>Elemento</th>
                        <th>Operario/Equipo</th> <th>Recambios</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody>
                    {% for reg in realizados %}
                    <tr style="background-color: {{ '#e3f2fd' if reg[8] == 'Papelera' else '#ffffff' }};">
                        <td>{{ reg[4].strftime('%d/%m %H:%M') }}</td>
                        <td>{{ reg[1] }}<br><small class="text-muted">{{ reg[2] }}</small></td>
                        <td><strong>{{ reg[5] if reg[5] else 'Sin asignar' }}</strong></td> <td>{{ reg[7] }}</td>
                        <td>
                            <form action="/borrar_historial/{{ reg[0] }}" method="POST" onsubmit="return confirmarBorrado(this);">
                                <input type="hidden" name="pin" id="pin_{{ reg[0] }}">
                                <button type="submit" class="btn btn-outline-danger btn-sm">Borrar</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
    <script>
    function confirmarBorrado(form) {
        const pin = prompt("PIN para borrar:");
        if (pin === "2026") { form.querySelector('input[name="pin"]').value = pin; return true; }
        else if (pin) alert("PIN Incorrecto");
        return false;
    }
    </script>
</body>
</html>
