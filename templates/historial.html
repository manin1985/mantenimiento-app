<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold mb-0 text-primary">HISTORIAL DE TRABAJO</h5>
            <div>
                <a href="/exportar" class="btn btn-success btn-sm me-1">Descargar Excel</a>
                <a href="/" class="btn btn-secondary btn-sm">Volver</a>
            </div>
        </div>
        <div class="table-responsive bg-white rounded shadow-sm">
            <table class="table table-sm table-hover align-middle mb-0" style="font-size: 0.82rem;">
                <thead class="table-dark">
                    <tr><th>Fecha/Hora</th><th>Elemento/Ubicación</th><th>Fracción</th><th>Materiales</th></tr>
                </thead>
                <tbody>
                    {% for r in realizados %}
                    <tr>
                        <td class="text-nowrap">
                            <span class="fw-bold">{{ r[4].strftime('%d/%m/%Y') }}</span><br>
                            <small class="text-muted">{{ r[4].strftime('%H:%M') }}</small>
                        </td>
                        <td>
                            <span class="badge {% if r[8]=='Papelera' %}bg-secondary{% else %}bg-info text-dark{% endif %}">{{ r[8] }}</span><br>
                            <b class="text-uppercase">{{ r[1] }}</b><br>
                            <small class="text-muted">📍 {{ r[2] }} | 👷 {{ r[5] }}</small>
                        </td>
                        <td class="fw-bold text-center">{{ r[9] }}</td>
                        <td><small>{{ r[7] }}</small></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
