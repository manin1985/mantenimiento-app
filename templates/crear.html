<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Aviso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-4">
        <div class="card shadow border-0">
            <div class="card-header bg-primary text-white fw-bold text-center">NUEVA INCIDENCIA</div>
            <div class="card-body">
                <form action="/nuevo" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Tipo de Elemento</label>
                        <select name="tipo" class="form-select" id="tipoSelect" onchange="togglePrio(this.value)">
                            <option value="Contenedor">Contenedor</option>
                            <option value="Papelera">Papelera</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Descripción (ej: 3200L / Circular)</label>
                        <input type="text" name="elemento" class="form-control" placeholder="Nombre o modelo..." required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Ubicación</label>
                        <input type="text" name="ubicacion" class="form-control" placeholder="Calle y número..." required>
                    </div>
                    <div class="mb-3" id="prioDiv">
                        <label class="form-label fw-bold text-danger">Prioridad</label>
                        <select name="prioridad" class="form-select">
                            <option value="Baja">Baja</option>
                            <option value="Media">Media</option>
                            <option value="Alta">Alta</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">PIN Seguridad</label>
                        <input type="password" name="pin" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2">CREAR AVISO</button>
                    <a href="/" class="btn btn-outline-secondary w-100 mt-2">Cancelar y Volver</a>
                </form>
            </div>
        </div>
    </div>
    <script>
        function togglePrio(val) { document.getElementById('prioDiv').style.display = (val === 'Papelera') ? 'none' : 'block'; }
    </script>
</body>
</html>
